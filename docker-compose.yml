services:
  db:
    build:
      context: .
      dockerfile: docker/Dockerfile.db
    environment:
      POSTGRES_DB: gestor_tareas
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      # PGDATA must stay at /data subdir so the parent dir has room for
      # migration staging (data_new_pg17/) and backup (data_pg16_backup/).
      # All three dirs land on the same volume → pg_upgrade --link works.
      PGDATA: /var/lib/postgresql/data
    volumes:
      # Mount at PARENT of PGDATA so migration dirs share the same filesystem
      - pgdata:/var/lib/postgresql
      - ./server/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "3002:3001"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: gestor_tareas
      DB_USER: postgres
      DB_PASSWORD: postgres
      PORT: 3001
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
