services:
  db:
    build:
      context: .
      dockerfile: docker/Dockerfile.db
    environment:
      POSTGRES_DB: gestor_tareas
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      # PGDATA uses /pgdata (not /data) to avoid Docker's implicit double-mount
      # of the named volume at both /var/lib/postgresql and /var/lib/postgresql/data
      # (caused by VOLUME /var/lib/postgresql/data in the postgres base image).
      PGDATA: /var/lib/postgresql/pgdata
    volumes:
      # Mount at PARENT of PGDATA so migration dirs share the same filesystem
      - pgdata:/var/lib/postgresql
      - ./server/schema.sql:/docker-entrypoint-initdb.d/schema.sql
      # zz-restore.sh runs after schema.sql on fresh init and restores latest backup
      - ./docker/zz-restore.sh:/docker-entrypoint-initdb.d/zz-restore.sh
      # Bind mount (not a volume) so backups survive docker compose down -v
      - ./db-backups:/backups
    ports:
      - "5433:5432"
    # Extra time on stop so the backup pg_dump can finish before SIGKILL
    stop_grace_period: 60s
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "3002:3001"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: gestor_tareas
      DB_USER: postgres
      DB_PASSWORD: postgres
      PORT: 3001
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
